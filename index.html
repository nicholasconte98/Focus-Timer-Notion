<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Timer</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 1rem;
        }
        .container {
            text-align: center;
            border: 2px solid #444;
            padding: 2rem;
            border-radius: 8px;
            background-color: #111;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }
        .timer {
            font-size: 4rem;
            margin: 1rem 0;
            color: #eee;
            transition: all 0.2s ease;
        }
        .timer.alert-active {
            color: #ff0000;
            font-weight: bold;
            animation: blink 0.5s infinite;
        }
        .controls {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .controls input[type="number"] {
            width: 4rem;
            padding: 0.5rem;
            border: 1px solid #444;
            border-radius: 4px;
            background-color: #222;
            color: #fff;
        }
        .controls button {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            background-color: #444;
            color: #fff;
            cursor: pointer;
        }
        .controls button:hover {
            background-color: #666;
        }
        #alert {
            display: none;
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: #ff3333;
            border-radius: 8px;
            animation: pulse 0.6s infinite;
        }
        #alert.show {
            display: block;
        }
        #alertText {
            font-size: 2.5rem;
            margin: 0.5rem 0;
        }
        #alertMessage {
            font-size: 1.2rem;
            margin: 0.5rem 0;
        }
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }
        @keyframes blink {
            0%, 49% {
                color: #ff0000;
            }
            50%, 100% {
                color: #ffcccc;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Focus Timer</h1>
        <div id="timer" class="timer">00:00:00</div>
        <div class="controls">
            <input type="number" id="hours" placeholder="Hours" min="0">
            <input type="number" id="minutes" placeholder="Minutes" min="0" max="59">
            <input type="number" id="seconds" placeholder="Seconds" min="0" max="59">
            <button id="startBtn">Start</button>
            <button id="resetBtn">Reset</button>
        </div>
        <div id="alert">
            <div id="alertText">⏰</div>
            <div id="alertMessage">Time's up! Your focus session is complete.</div>
        </div>
    </div>

    <script>
        let countdown;
        const timerDisplay = document.getElementById('timer');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const hoursInput = document.getElementById('hours');
        const minutesInput = document.getElementById('minutes');
        const secondsInput = document.getElementById('seconds');
        const alertElement = document.getElementById('alert');

        function displayTime(seconds) {
            const hrs = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            timerDisplay.textContent =
                `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        let audioContext = null;
        function playBeep() {
            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = 800;
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.5);
            } catch (e) {
                console.log('Audio not available');
            }
        }

        function showAlert() {
            alertElement.classList.add('show');
            timerDisplay.classList.add('alert-active');
            
            // Play 5 beeps
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    playBeep();
                }, i * 600);
            }
            
            // Hide alert after 5 seconds
            setTimeout(() => {
                alertElement.classList.remove('show');
                timerDisplay.classList.remove('alert-active');
            }, 5000);
        }

        function startTimer() {
            const hrs = parseInt(hoursInput.value, 10) || 0;
            const mins = parseInt(minutesInput.value, 10) || 0;
            const secs = parseInt(secondsInput.value, 10) || 0;
            if (hrs < 0 || mins < 0 || secs < 0) return;
            clearInterval(countdown);
            let seconds = hrs * 3600 + mins * 60 + secs;
            if (seconds === 0) return;
            displayTime(seconds);
            countdown = setInterval(() => {
                seconds--;
                displayTime(seconds);
                if (seconds === 0) {
                    clearInterval(countdown);
                    showAlert();
                }
            }, 1000);
        }

        function resetTimer() {
            clearInterval(countdown);
            displayTime(0);
            alertElement.classList.remove('show');
            timerDisplay.classList.remove('alert-active');
        }

        startBtn.addEventListener('click', startTimer);
        resetBtn.addEventListener('click', resetTimer);

        // initialize display
        resetTimer();
    </script>
</body>
</html>
